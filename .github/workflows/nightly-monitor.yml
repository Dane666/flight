name: Nightly Flight Monitor

on:
  schedule:
    - cron: '0 1 * * 1-5'      # 工作日 09:00 (UTC 1:00 = 北京时间 09:00)
    - cron: '0 10 * * 1-5'     # 工作日 18:00 (UTC 10:00 = 北京时间 18:00)
    - cron: '0 2 * * 0,6'      # 周末 10:00 (UTC 2:00 = 北京时间 10:00)
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Ensure config.yaml exists
        env:
          MONITOR_CONFIG_YAML: ${{ secrets.MONITOR_CONFIG_YAML }}
        run: |
          if [ -n "$MONITOR_CONFIG_YAML" ]; then
            printf "%s\n" "$MONITOR_CONFIG_YAML" > config.yaml
          fi

          if [ ! -f config.yaml ]; then
            python main.py init-config --force
          fi

      - name: Run summary monitor
        run: |
          python main.py run-best-deals-summary --config config.yaml
