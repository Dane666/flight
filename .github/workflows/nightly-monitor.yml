name: Nightly Flight Monitor

on:
  schedule:
    - cron: '0 16 * * *' # UTC 16:00 = Asia/Shanghai 00:00 (+1 day)
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Ensure config.yaml exists
        env:
          MONITOR_CONFIG_YAML: ${{ secrets.MONITOR_CONFIG_YAML }}
        run: |
          if [ -n "$MONITOR_CONFIG_YAML" ]; then
            printf "%s\n" "$MONITOR_CONFIG_YAML" > config.yaml
          fi

          if [ ! -f config.yaml ]; then
            python main.py init-config --force
          fi

      - name: Run summary monitor
        run: |
          python main.py run-best-deals-summary --config config.yaml
