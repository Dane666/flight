name: Nightly Flight Monitor

on:
  schedule:
    - cron: '0 1 * * 1-5'      # 工作日 09:00 (UTC 1:00 = 北京时间 09:00)
    - cron: '0 10 * * 1-5'     # 工作日 18:00 (UTC 10:00 = 北京时间 18:00)
    - cron: '0 2 * * 0,6'      # 周末 10:00 (UTC 2:00 = 北京时间 10:00)
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Build config.yaml from secrets
        env:
          MONITOR_CONFIG_YAML: ${{ secrets.MONITOR_CONFIG_YAML }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: |
          if [ -n "$MONITOR_CONFIG_YAML" ]; then
            echo "$MONITOR_CONFIG_YAML" > config.yaml
            echo "Using MONITOR_CONFIG_YAML secret"
          else
            python main.py init-config --force
            echo "MONITOR_CONFIG_YAML not set, generated default config"
          fi

          python - <<'PYCFG'
from pathlib import Path
import os
import yaml

content = Path('config.yaml').read_text(encoding='utf-8')
obj = yaml.safe_load(content)
if isinstance(obj, str):
    obj = yaml.safe_load(obj)
if not isinstance(obj, dict):
    raise SystemExit(f"Invalid config type: {type(obj).__name__}")

feishu_webhook = os.getenv("FEISHU_WEBHOOK_URL")
feishu_secret = os.getenv("FEISHU_SECRET")
if feishu_webhook:
    obj["feishu_webhook_url"] = feishu_webhook
if feishu_secret:
    obj["feishu_secret"] = feishu_secret

Path('config.yaml').write_text(
    yaml.safe_dump(obj, allow_unicode=True, sort_keys=False),
    encoding='utf-8',
)
print("config.yaml ready")
PYCFG

      - name: Run summary monitor
        run: |
          python main.py run-best-deals-summary --config config.yaml
