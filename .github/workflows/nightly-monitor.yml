name: Nightly Flight Monitor

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 1 * * 1-5' # 工作日 09:00 (UTC+8)
    - cron: '0 10 * * 1-5' # 工作日 18:00 (UTC+8)
    - cron: '0 2 * * 0,6' # 周末 10:00 (UTC+8)
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Build config.yaml from secrets
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          GOOGLE_FLIGHTS_HL: ${{ secrets.GOOGLE_FLIGHTS_HL }}
          GOOGLE_FLIGHTS_GL: ${{ secrets.GOOGLE_FLIGHTS_GL }}
        run: |
          python main.py init-config --force
          echo "Generated default config.yaml from repository defaults"

          python - <<'PY'
          from pathlib import Path
          import os
          import sys
          import yaml

          path = Path("config.yaml")
          obj = yaml.safe_load(path.read_text(encoding="utf-8"))
          if isinstance(obj, str):
              obj = yaml.safe_load(obj)
          assert isinstance(obj, dict), f"Invalid config type: {type(obj).__name__}"

          serpapi = os.getenv("SERPAPI_API_KEY")
          feishu_webhook = os.getenv("FEISHU_WEBHOOK_URL")
          feishu_secret = os.getenv("FEISHU_SECRET")
          google_hl = os.getenv("GOOGLE_FLIGHTS_HL") or "en"
          google_gl = os.getenv("GOOGLE_FLIGHTS_GL") or "hk"

          obj["serpapi_api_key"] = serpapi
          obj["google_flights_hl"] = google_hl
          obj["google_flights_gl"] = google_gl
          obj["provider"] = "google_flights" if serpapi else "trip_scrape"
          obj["currency"] = obj.get("currency", "CNY")
          obj["trip_scrape_timeout_seconds"] = int(
              obj.get("trip_scrape_timeout_seconds", 60)
          )
          obj["notifier"] = "feishu" if feishu_webhook else obj.get(
              "notifier",
              "console",
          )
          obj["feishu_webhook_url"] = feishu_webhook
          obj["feishu_secret"] = feishu_secret

          if obj["provider"] == "google_flights" and not obj["serpapi_api_key"]:
              sys.exit("SERPAPI_API_KEY is required when provider=google_flights")

          path.write_text(
              yaml.safe_dump(obj, allow_unicode=True, sort_keys=False),
              encoding="utf-8",
          )
          print(
              "config.yaml ready, "
              f"provider={obj.get('provider')}, "
              f"notifier={obj.get('notifier')}, "
              f"window={obj.get('window_start')}/{obj.get('window_end')}"
          )
          PY

      - name: Run summary monitor
        run: |
          python main.py run-best-deals-summary --config config.yaml
